name: CI

on:
  push:
    branches: [main, develop, fastapi-training]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: fast_api_practice
        run: uv sync --extra dev

      - name: Ruff lint
        working-directory: fast_api_practice
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        working-directory: fast_api_practice
        run: uv run ruff format --check src/ tests/

  # ── Job 2: Test ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskmanager
          POSTGRES_PASSWORD: taskmanager_dev
          POSTGRES_DB: fast_api_practice_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskmanager -d fast_api_practice_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://taskmanager:taskmanager_dev@localhost:5432/fast_api_practice_test
      DATABASE_URL_TEST: postgresql+asyncpg://taskmanager:taskmanager_dev@localhost:5432/fast_api_practice_test
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'ci-insecure-key-only-for-testing-not-used-in-prod-1234' }}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      APP_NAME: Collaborative Task Manager
      DEBUG: "false"
      SMTP_ENABLED: "false"
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "465"
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME || 'ci@example.com' }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || 'ci-placeholder' }}
      SMTP_FROM: ${{ secrets.SMTP_USERNAME || 'ci@example.com' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: fast_api_practice
        run: uv sync --extra dev

      - name: Run tests with coverage
        working-directory: fast_api_practice
        run: uv run pytest --tb=short --cov=src --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: fast_api_practice/coverage.xml

  # ── Job 3: Docker Build ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: fast_api_practice
          push: false
          tags: task-manager-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report image size
        run: 'docker images task-manager-api:ci-${{ github.sha }} --format "Image size: {{.Size}}"'
