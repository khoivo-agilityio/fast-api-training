[build]
# Use the Dockerfile (not Nixpacks/railpack auto-detection)
builder = "DOCKERFILE"
dockerfilePath = "fast_api_practice/Dockerfile"
dockerContextPath = "fast_api_practice"

[deploy]
# Start command — Railway injects $PORT; entrypoint runs migrations first.
# Uses python -m uvicorn (not bare script) to avoid venv shebang issues.
startCommand = "./docker-entrypoint.sh"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
