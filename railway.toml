[build]
# Use the Dockerfile — Railway always uses repo root as build context,
# so Dockerfile.railway has all COPY paths prefixed with fast_api_practice/.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
# Run migrations then start uvicorn. PYTHONUNBUFFERED=1 forces stdout/stderr to
# flush immediately so Railway captures startup logs (default buffering hides
# the uvicorn "Started server process" line until after healthcheck times out).
# Use ${PORT:-8000} fallback in case Railway hasn't injected PORT yet.
startCommand = "PYTHONUNBUFFERED=1 python -m alembic upgrade head && PYTHONUNBUFFERED=1 python -m uvicorn src.main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level info"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
