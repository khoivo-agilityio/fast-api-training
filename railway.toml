[build]
# Use the Dockerfile — Railway always uses repo root as build context,
# so Dockerfile.railway has all COPY paths prefixed with fast_api_practice/.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
# python -m uvicorn bypasses the broken venv script shebang from multi-stage build.
startCommand = "python -m alembic upgrade head && python -m uvicorn src.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
