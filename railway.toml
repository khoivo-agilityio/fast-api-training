[build]
# Use the Dockerfile (not Nixpacks/railpack auto-detection).
# Railway always uses repo root as build context regardless of dockerContextPath,
# so Dockerfile.railway has all COPY paths prefixed with fast_api_practice/.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
# startCommand intentionally omitted — ENTRYPOINT in Dockerfile runs migrations then uvicorn.
# Railway injects $PORT which the entrypoint script picks up via ${PORT:-8000}.
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
